<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信扫码登录</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; }
    h1 { font-size: 1.25rem; color: #333; margin-bottom: 16px; }
    .qr-wrap { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .qr-wrap img { max-width: 260px; height: auto; display: block; margin: 0 auto 12px; }
    .hint { color: #666; font-size: 14px; margin-top: 8px; }
    .expired { color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>微信扫码登录</h1>
  <div class="qr-wrap">
    <img id="qr" src="{{.QRURL}}" alt="扫码登录" />
    <p class="hint">请使用微信扫一扫</p>
    <p id="status" class="hint"></p>
  </div>
  <script>
    (function(){
      var token = '{{.Token}}';
      var redirectUri = '{{.RedirectURI}}';
      var statusEl = document.getElementById('status');
      var qrEl = document.getElementById('qr');

      function poll() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/scan/status?token=' + encodeURIComponent(token), true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState !== 4) return;
          try {
            var r = JSON.parse(xhr.responseText);
            if (r.status === 'success' && r.code) {
              statusEl.textContent = '登录成功，正在跳转...';
              if (redirectUri) {
                var sep = redirectUri.indexOf('?') >= 0 ? '&' : '?';
                window.location.href = redirectUri + sep + 'code=' + encodeURIComponent(r.code);
              } else {
                statusEl.textContent = '登录成功。code: ' + r.code;
              }
              return;
            }
            if (r.status === 'expired') {
              statusEl.textContent = '二维码已过期，请刷新页面';
              statusEl.className = 'expired';
              qrEl.style.opacity = '0.5';
              return;
            }
          } catch (e) {}
          setTimeout(poll, 2000);
        };
        xhr.send();
      }
      setTimeout(poll, 1500);
    })();
  </script>
</body>
</html>
