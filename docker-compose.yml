# 基于 docker-compose.yml.bak 模板，使用 MySQL，应用本地构建
# version 已废弃，Compose 会自动识别，已移除以避免警告

# 开发调试：仅启动依赖时执行 docker-compose up -d（不带 --profile app）
# 完整启动（含应用）时执行 docker-compose --profile app up -d
#
# 【修改密码说明】若需修改 MySQL 或应用密钥，请同步修改以下两处，保持一致：
#   1) one-hub 的 environment.SQL_DSN 中的 用户名:密码（格式 user:pass@tcp(...)）
#   2) db 的 environment 中的 MYSQL_ROOT_PASSWORD / MYSQL_USER / MYSQL_PASSWORD
#   SESSION_SECRET、USER_TOKEN_SECRET 为应用会话密钥，生产环境请改为随机字符串。
#
services:
  one-hub:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    image: one-hub:latest
    container_name: one-hub-com
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      # 数据库密码修改在此处！！！
      # 格式：用户名:密码@tcp(主机:端口)/库名 —— 修改密码时此处与 db.MYSQL_PASSWORD 保持一致
      - SQL_DSN=oneapi:123456@tcp(db:3306)/one-api
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=aaaa1111bbbb2222cccc3333dddd5555
      - USER_TOKEN_SECRET=aaaa1111bbbb2222cccc3333dddd4444
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $$2}'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: one-hub-redis
    restart: always
    ports:
      - "6379:6379"

  db:
    image: mysql:8.2.0
    restart: always
    container_name: one-hub-mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      # 数据库密码修改在此处！！！
      # 修改 MySQL 密码时：改下面三项，并同步修改上面 one-hub 的 SQL_DSN 中的 用户名:密码
      MYSQL_ROOT_PASSWORD: "OneAPI@justsong"
      MYSQL_USER: oneapi
      MYSQL_PASSWORD: "123456"
      MYSQL_DATABASE: one-api
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    name: one-hub-net