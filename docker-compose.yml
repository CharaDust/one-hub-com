# 基于 docker-compose.yml.bak 模板，使用 MySQL，应用本地构建
# version 已废弃，Compose 会自动识别，已移除以避免警告

services:
  one-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: one-hub:latest
    container_name: one-hub-com
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - SQL_DSN=oneapi:123456@tcp(db:3306)/one-api
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=aaaa1111bbbb2222cccc3333dddd5555
      - USER_TOKEN_SECRET=aaaa1111bbbb2222cccc3333dddd4444
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $$2}'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: one-hub-redis
    restart: always

  db:
    image: mysql:8.2.0
    restart: always
    container_name: one-hub-mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "OneAPI@justsong"
      MYSQL_USER: oneapi
      MYSQL_PASSWORD: "123456"
      MYSQL_DATABASE: one-api
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
